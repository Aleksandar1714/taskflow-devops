apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "taskflow.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "taskflow.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "taskflow.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "taskflow.name" . }}
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/path: /metrics
        prometheus.io/port: '8000'
    spec:
      containers:
        - name: taskflow
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              valueFrom:
                secretKeyRef:
                  name: {{ include "taskflow.fullname" . }}-secret
                  key: APP_ENV
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          resources:
{{ toYaml .Values.resources | indent 12 }}
