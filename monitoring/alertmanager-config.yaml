apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-webhook
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: webhook-receiver
    receivers:
      - name: webhook-receiver
        webhook_configs:
          - url: https://example.com/webhook
            send_resolved: true
