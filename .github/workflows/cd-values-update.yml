name: Update Helm values for CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  update-values:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image tag
        run: |
          SHORT_SHA=$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)
          sed -i "s/tag: .*/tag: sha-${SHORT_SHA}/" charts/taskflow/values.yaml

      - name: Commit updated values
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add charts/taskflow/values.yaml
          git diff --cached --quiet || git commit -m "chore(cd): update image tag from CI"
          git push

      - name: Notify webhook
        env:
          WEBHOOK_URL: ${{ secrets.CD_WEBHOOK_URL }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{"text":"🚀 CD manifest updated for ArgoCD sync"}'
